<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentinelAI | Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🛡 SentinelAI</div>
      <div class="auth-sub">Create your security analyst account</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" required placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="you@bank.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </div>
    </div>
  </div>
</body>
</html>
