<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentinelAI | {{ 'Sign Up' if active_tab == 'signup' else 'Login' }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🛡 SentinelAI</div>
      <div class="auth-sub">Banking Threat Intelligence &amp; Fraud Detection</div>

      <div class="auth-tabs">
        <button type="button" class="tab-btn {{ 'active' if active_tab == 'login' else '' }}" data-target="login-form">Log In</button>
        <button type="button" class="tab-btn {{ 'active' if active_tab == 'signup' else '' }}" data-target="signup-form">Sign Up</button>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <!-- Generic error handling for flashed messages -->
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <!-- LOGIN FORM -->
      <form id="login-form" method="POST" action="{{ url_for('login') }}" class="auth-form {{ 'hidden' if active_tab == 'signup' else '' }}" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" required placeholder="you@bank.com">
          <span class="error-msg" id="login-email-error"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-password" name="password" required placeholder="••••••••">
            <button type="button" class="toggle-password" data-target="login-password" aria-label="Show password">👁</button>
          </div>
          <span class="error-msg" id="login-password-error"></span>
        </div>
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember"> Remember me
          </label>
          <a href="#" class="forgot-password" onclick="event.preventDefault(); alert('Password recovery flow not implemented in this demo.');">Forgot password?</a>
        </div>
        <button type="submit" class="btn auth-submit" id="login-submit">
          <span class="btn-text">Log In</span>
          <span class="loader hidden"></span>
        </button>
        
        <div class="demo-hint" style="margin-top: 15px;">
          Demo login — email: <code>admin@sentinelai.com</code><br>password: <code>Admin@123</code>
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" method="POST" action="{{ url_for('signup') }}" class="auth-form {{ 'hidden' if active_tab == 'login' else '' }}" novalidate>
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" name="full_name" required placeholder="Jane Doe">
          <span class="error-msg" id="signup-name-error"></span>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" required placeholder="you@bank.com">
          <span class="error-msg" id="signup-email-error"></span>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="signup-password" name="password" required placeholder="Min 8 chars, 1 uppercase, 1 number, 1 special">
            <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">👁</button>
          </div>
          <span class="error-msg" id="signup-password-error"></span>
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="signup-confirm" name="confirm_password" required placeholder="Match your password">
            <button type="button" class="toggle-password" data-target="signup-confirm" aria-label="Show password">👁</button>
          </div>
          <span class="error-msg" id="signup-confirm-error"></span>
        </div>
        <button type="submit" class="btn auth-submit" id="signup-submit" disabled>
          <span class="btn-text">Create Account</span>
          <span class="loader hidden"></span>
        </button>
      </form>

    </div>
  </div>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
