{% extends "base.html" %}
{% block page_title %}Cybersecurity Telemetry{% endblock %}
{% block header_title %}Cybersecurity Telemetry{% endblock %}

{% block content %}

<div style="margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
  <div style="color:var(--muted); font-size:13.5px;">Run analysis to see which sessions triggered elevated risk</div>
  <div style="display:flex; align-items:center; gap:14px;">
    <label style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:6px;">
      <input type="checkbox" onchange="toggleLiveMode(this, 30, renderTelemetry)"> Live Mode
    </label>
    <button class="btn-cta" style="padding:6px 12px; font-size:12px; background:#202126; border:1px solid var(--border); color:var(--text);" onclick="downloadData()">Download Data</button>
    <button id="runBtn" class="btn-run" onclick="runAnalysis(30, renderTelemetry)">Run Live Analysis</button>
  </div>
</div>

<div class="card">
  <div id="telemetryList" class="empty-state">No analysis run yet.</div>
</div>
{% endblock %}

{% block scripts %}
<style>
@keyframes radarPing {
  0% { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(2.5); opacity: 0; }
}
.radar-ping {
  position: relative; display: inline-block; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%; margin-right: 6px;
}
.radar-ping::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 50%; border: 1px solid var(--accent);
  animation: radarPing 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
}
</style>
<script>
function renderTelemetry(data) {
  const flagged = data.transactions.filter(t => t.quantum_flag || t.risk_level !== "Low");
  const el = document.getElementById("telemetryList");
  if (!flagged.length) {
    el.className = "empty-state";
    el.innerText = "No elevated-risk sessions in this batch.";
    return;
  }
  el.className = "";
  el.innerHTML = flagged.map(t => {
    let riskPill = `<span class="${riskPillClass(t.risk_level)}">${t.risk_level}</span>`;
    let earlyWarningBadge = '';
    
    if (t.early_warning) {
      riskPill = `<span class="pill pill-medium" style="background-color:#00fff2; border-color:#00fff2; color:#0a0e17;">Early Warning</span>`;
      let detectedTime = new Date();
      let normalCatchTime = new Date(detectedTime.getTime() + 4.5*60000); 
      earlyWarningBadge = `<br><span style="font-size:10px; color:#00fff2;">Detected: ${detectedTime.toLocaleTimeString()} | Est. Rules Catch: ${normalCatchTime.toLocaleTimeString()} (Saved ~4.5m)</span>`;
    }
    
    let feedbackUI = '';
    if (t.analyst_feedback) {
      feedbackUI = `<div style="margin-top:8px;"><span class="pill ${t.analyst_feedback === 'Confirmed' ? 'pill-high' : 'pill-low'}" style="font-size:10px; padding:2px 6px;">${t.analyst_feedback}</span></div>`;
    } else {
      feedbackUI = `<div style="margin-top:8px; display:flex; gap:6px; justify-content:flex-end;">
        <button class="btn-run" style="font-size:10px; padding:3px 6px;" onclick="submitFeedback('${t.ref}', 'Confirmed', this)">Confirm Threat</button>
        <button class="btn-false" onclick="submitFeedback('${t.ref}', 'False Alarm', this)">False Alarm</button>
      </div>`;
    }
    
    return `
    <div class="card slide-in" style="padding:12px 16px; margin-bottom:12px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <strong style="font-family:var(--font-mono); color:var(--text); font-size:14px;">${t.ref}</strong>
        <span style="color:var(--muted); font-size:13px; display:block; margin-top:4px;">${t.explanation}${earlyWarningBadge}</span>
        <span style="color:var(--muted); font-size:11.5px; display:flex; align-items:center; gap:12px; margin-top:8px;">
          <span>Failed Logins: <strong style="color:${t.failed_logins > 5 ? 'var(--danger)' : 'var(--text)'}; font-family:var(--font-mono);">${t.failed_logins || 0}</strong></span>
          <span>Encryption: <strong style="font-family:var(--font-mono); color:${t.quantum_flag ? 'var(--quantum)' : 'var(--text)'};">${t.encryption || 'Unknown'}</strong></span>
          <span style="display:flex; align-items:center;"><div class="radar-ping"></div><strong style="font-family:var(--font-mono);">${t.location || 'Unknown'}</strong></span>
          <span style="font-family:var(--font-mono);">IP: <strong style="color:var(--text);">${t.ip_address || '192.168.1.1'}</strong></span>
        </span>
      </div>
      <div style="text-align:right;">
        <div style="margin-bottom:6px;">${riskPill}</div>
        ${t.quantum_flag ? '<div style="margin-bottom:6px;"><span class="pill pill-quantum">Quantum Risk</span></div>' : ''}
        ${feedbackUI}
      </div>
    </div>`;
  }).join("");
}
</script>
{% endblock %}
