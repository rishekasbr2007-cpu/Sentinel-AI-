<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentinelAI | Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🛡 SentinelAI</div>
      <div class="auth-sub">Banking Threat Intelligence &amp; Fraud Detection</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="you@bank.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
      </div>

      <div class="demo-hint">
        Demo login — email: <code>admin@sentinelai.com</code> · password: <code>Admin@123</code>
      </div>
    </div>
  </div>
</body>
</html>
